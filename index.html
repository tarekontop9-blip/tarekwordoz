<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Typing Lobby Game</title>

<style>
body {
    background: #0d0d0d;
    color: white;
    text-align: center;
    font-family: Arial;
    padding-top: 50px;
}

button {
    padding: 10px 20px;
    margin: 5px;
    background: #00ffcc;
    border: none;
    cursor: pointer;
    font-size: 16px;
}

input {
    padding: 8px;
    margin: 5px;
    font-size: 16px;
}

#sentence {
    font-size: 40px;
    font-weight: bold;
    margin: 30px;
    color: #00ffcc;
}

#players {
    margin-top: 20px;
    font-size: 18px;
}
</style>
</head>

<body>

<h1>Typing Game 🔥</h1>

<input id="username" placeholder="Username">

<br><br>

<button onclick="createLobby()">Create Lobby</button>

<br><br>

<input id="code" placeholder="Lobby Code">
<button onclick="joinLobby()">Join Lobby</button>

<h2 id="status"></h2>
<div id="players"></div>

<div id="game" style="display:none;">
    <h2 id="sentence"></h2>
    <input id="answer" placeholder="Scrie aici...">
    <button onclick="submitAnswer()">Trimite</button>
    <h2 id="winner"></h2>
</div>

<br>
<button onclick="startGame()">START GAME</button>

<script>
let lobby = null;
let name = null;

async function createLobby() {
    name = document.getElementById("username").value;

    if (!name) {
        alert("Scrie username!");
        return;
    }

    const res = await fetch("/api/lobby?action=create");
    const data = await res.json();

    lobby = data.code;

    await fetch(`/api/lobby?action=join&code=${lobby}&name=${name}`);

    document.getElementById("status").innerText = "Lobby creat: " + lobby;

    startPolling();
}

async function joinLobby() {
    name = document.getElementById("username").value;
    lobby = document.getElementById("code").value.toUpperCase();

    if (!name) {
        alert("Scrie username!");
        return;
    }

    const res = await fetch(`/api/lobby?action=join&code=${lobby}&name=${name}`);
    const data = await res.json();

    if (data.error) {
        document.getElementById("status").innerText = data.error;
        return;
    }

    document.getElementById("status").innerText = "Lobby: " + lobby;

    startPolling();
}

async function startGame() {
    if (!lobby) {
        alert("Nu esti in lobby!");
        return;
    }

    await fetch(`/api/lobby?action=start&code=${lobby}`);
}

async function submitAnswer() {
    const text = document.getElementById("answer").value;

    await fetch(`/api/lobby?action=answer&code=${lobby}&name=${name}&text=${text}`);
}

function startPolling() {
    setInterval(async () => {
        if (!lobby) return;

        const res = await fetch(`/api/lobby?action=get&code=${lobby}`);
        const data = await res.json();

        if (data.error) {
            document.getElementById("status").innerText = data.error;
            return;
        }

        document.getElementById("players").innerText =
            "Players: " + (data.players?.join(", ") || "");

        if (data.sentence) {
            document.getElementById("game").style.display = "block";
            document.getElementById("sentence").innerText = data.sentence;
        } else {
            document.getElementById("game").style.display = "none";
        }

        if (data.winner) {
            document.getElementById("winner").innerText =
                "🏆 Winner: " + data.winner;
        }

    }, 1000);
}
</script>

</body>
</html>
